<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Meridian — Standard User Flow Diagram</title>
<style>
  body { margin: 40px; background: #fff; font-family: system-ui, -apple-system, sans-serif; }
  h1 { font-size: 22px; color: #1a1a1a; margin-bottom: 4px; }
  p.subtitle { font-size: 14px; color: #666; margin-bottom: 24px; }
</style>
</head>
<body>
<h1>The Meridian — Standard User Flow Diagram</h1>
<p class="subtitle">High-level flowchart: Oval = Start/End | Rectangle = Process | Diamond = Decision | Parallelogram = Input/Output</p>

<svg viewBox="0 0 700 920" xmlns="http://www.w3.org/2000/svg" role="img" style="max-width:700px;">
  <title>The Meridian — High-Level User Flow</title>
  <desc>Flowchart showing user engagement through discovery, diagnosis via False Positive Framework, track selection, and the content/discovery loop.</desc>
  <style>
    text { font-family: system-ui, -apple-system, sans-serif; }
    .label { font-size: 13px; fill: #1a1a1a; text-anchor: middle; dominant-baseline: central; }
    .label-sm { font-size: 11px; fill: #555; text-anchor: middle; dominant-baseline: central; }
    .label-bold { font-size: 13px; fill: #1a1a1a; text-anchor: middle; dominant-baseline: central; font-weight: 600; }
    .legend { font-size: 11px; fill: #555; }
    .arrow { stroke: #888; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .shape-start { stroke: #2563eb; stroke-width: 2; fill: #eff6ff; }
    .shape-decision { stroke: #d97706; stroke-width: 1.5; fill: #fffbeb; }
    .shape-process { stroke: #888; stroke-width: 1.5; fill: #fff; }
    .shape-io { stroke: #7c3aed; stroke-width: 1.5; fill: #f5f3ff; }
    .shape-end { stroke: #059669; stroke-width: 2; fill: #ecfdf5; }
    .branch-yes { font-size: 11px; fill: #059669; font-weight: 600; }
    .branch-no { font-size: 11px; fill: #dc2626; font-weight: 600; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#888" />
    </marker>
  </defs>
  <g transform="translate(20, 12)">
    <ellipse cx="8" cy="8" rx="8" ry="6" class="shape-start" />
    <text x="22" y="11" class="legend">Start/End</text>
    <rect x="90" y="2" width="16" height="12" rx="2" class="shape-process" />
    <text x="112" y="11" class="legend">Process</text>
    <polygon points="200,8 208,2 216,8 208,14" class="shape-decision" />
    <text x="222" y="11" class="legend">Decision</text>
    <polygon points="320,2 336,2 330,14 314,14" class="shape-io" />
    <text x="342" y="11" class="legend">Input/Output</text>
  </g>
  <ellipse cx="350" cy="70" rx="100" ry="30" class="shape-start" />
  <text x="350" y="70" class="label-bold">User Opens App</text>
  <line x1="350" y1="100" x2="350" y2="140" class="arrow" />
  <polygon points="260,140 440,140 420,180 280,180" class="shape-io" />
  <text x="350" y="155" class="label-bold">Discovery Intake</text>
  <text x="350" y="170" class="label-sm">User shares context</text>
  <line x1="350" y1="180" x2="350" y2="220" class="arrow" />
  <rect x="250" y="220" width="200" height="50" rx="4" class="shape-process" />
  <text x="350" y="240" class="label-bold">Relational Mirror</text>
  <text x="350" y="255" class="label-sm">AI assesses interior life</text>
  <line x1="350" y1="270" x2="350" y2="310" class="arrow" />
  <polygon points="350,310 470,365 350,420 230,365" class="shape-decision" />
  <text x="350" y="358" class="label-bold">False Positive</text>
  <text x="350" y="374" class="label-sm">Identified?</text>
  <line x1="350" y1="420" x2="350" y2="460" class="arrow" />
  <text x="363" y="445" class="branch-yes">Yes</text>
  <line x1="230" y1="365" x2="160" y2="365" class="arrow" />
  <text x="188" y="357" class="branch-no">No</text>
  <line x1="160" y1="365" x2="160" y2="160" stroke="#888" stroke-width="1.5" fill="none" stroke-dasharray="5,4" />
  <line x1="160" y1="160" x2="258" y2="160" class="arrow" />
  <text x="160" y="260" class="label-sm" transform="rotate(-90, 160, 260)">Deeper Discovery</text>
  <polygon points="260,460 440,460 420,500 280,500" class="shape-io" />
  <text x="350" y="475" class="label-bold">Track Assignment</text>
  <text x="350" y="490" class="label-sm">Personalized path</text>
  <line x1="350" y1="500" x2="350" y2="540" class="arrow" />
  <rect x="240" y="540" width="220" height="50" rx="4" class="shape-process" />
  <text x="350" y="560" class="label-bold">Content Delivery</text>
  <text x="350" y="575" class="label-sm">Stories, scripture, exercises</text>
  <line x1="350" y1="590" x2="350" y2="630" class="arrow" />
  <polygon points="350,630 470,685 350,740 230,685" class="shape-decision" />
  <text x="350" y="678" class="label-bold">Resonates?</text>
  <text x="350" y="694" class="label-sm">User progresses?</text>
  <line x1="350" y1="740" x2="350" y2="780" class="arrow" />
  <text x="363" y="765" class="branch-yes">Yes</text>
  <line x1="470" y1="685" x2="540" y2="685" class="arrow" />
  <text x="512" y="677" class="branch-no">No</text>
  <line x1="540" y1="685" x2="540" y2="245" stroke="#888" stroke-width="1.5" fill="none" stroke-dasharray="5,4" />
  <line x1="540" y1="245" x2="452" y2="245" class="arrow" />
  <text x="540" y="465" class="label-sm" transform="rotate(90, 540, 465)">Re-enter Discovery</text>
  <rect x="250" y="780" width="200" height="50" rx="4" class="shape-process" />
  <text x="350" y="800" class="label-bold">Next Step</text>
  <text x="350" y="815" class="label-sm">Deeper into track</text>
  <path d="M 250,805 L 180,805 L 180,565 L 238,565" class="arrow" stroke-dasharray="5,4" />
  <text x="180" y="685" class="label-sm" transform="rotate(-90, 180, 685)">Continue Track</text>
  <line x1="350" y1="830" x2="350" y2="870" class="arrow" />
  <ellipse cx="350" cy="895" rx="120" ry="25" class="shape-end" />
  <text x="350" y="895" class="label-bold">Integrated Discernment</text>
</svg>
</body>
</html>
